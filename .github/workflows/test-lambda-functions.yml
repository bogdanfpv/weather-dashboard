name: Test Lambda Functions

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moto[all] boto3

      - name: Build SAM application
        run: |
          cd backend/sam-app
          sam build

      - name: Run tests
        run: |
          cd backend/sam-app
          python test_all_functions.py

      - name: Run SAM local tests (optional)
        run: |
          cd backend/sam-app
          # You can add sam local invoke tests here if needed
          echo "SAM local tests would go here"