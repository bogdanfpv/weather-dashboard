name: Deploy SAM Backend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli
      - name: Validate SAM template
        run: sam validate --config-file samconfig.toml
        working-directory: backend/sam-app
      - name: Build SAM app
        run: sam build --config-file samconfig.toml
        working-directory: backend/sam-app
      # - name: Run tests (add if you write tests)
      #   run: pytest
      - name: Deploy to AWS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --config-file backend/sam-app/samconfig.toml --stack-name hello-world-app-v2 --capabilities CAPABILITY_IAM